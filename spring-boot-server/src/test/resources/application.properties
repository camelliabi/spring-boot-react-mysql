# FIX: Test configuration using H2 in-memory database
# Previous issue: Tests failed because they tried to connect to MySQL which isn't available in test environment
# Solution: Use H2 in-memory database for tests, allowing tests to run without external dependencies

# H2 In-Memory Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (optional, useful for debugging tests)
spring.h2.console.enabled=false

# JPA/Hibernate Configuration for H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Connection Pool Settings (smaller for tests)
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
