# FIX #10: Test configuration using H2 in-memory database
# ISSUE: Tests were failing because they tried to connect to MySQL which isn't available during testing
# ORIGINAL CODE: No test-specific configuration existed
# PROBLEM:
#   - @SpringBootTest loads full application context
#   - application.properties points to jdbc:mysql://localhost:3306/testdb
#   - Tests fail with "CONDITIONS EVALUATION REPORT" showing no beans loaded
#   - Cannot run automated tests without MySQL running
# SOLUTION: 
#   - Create application-test.properties with H2 in-memory database
#   - H2 is embedded and requires no external setup
#   - Tests can run independently without MySQL dependency
# IMPACT: 
#   - Tests now run successfully in CI/CD pipelines
#   - Developers can run tests without setting up MySQL
#   - Faster test execution with in-memory database

spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Disable Hikari pool for tests
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.minimum-idle=1
