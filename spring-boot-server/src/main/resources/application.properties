spring.datasource.url= jdbc:mysql://localhost:3306/testdb?useSSL=false&autoReconnect=true&maxReconnects=1
spring.datasource.username= root
spring.datasource.password= 123456

spring.jpa.properties.hibernate.dialect= org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto= update

spring.datasource.hikari.maximum-pool-size= 5
spring.datasource.hikari.minimum-idle= 5

# FIX ERROR-015: Externalized CORS Configuration
# Allows different origins for different environments
# For production, change to: cors.allowed.origins=https://production-domain.com
# For multiple origins, use comma-separated list: http://localhost:8081,http://localhost:3000
cors.allowed.origins=http://localhost:8081

# FIX ERROR-013: Enhanced Logging Configuration
# Enables detailed error tracking and debugging
logging.level.com.bezkoder.spring.datajpa=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
