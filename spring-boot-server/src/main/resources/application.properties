# FIX #14: Removed deprecated autoReconnect and maxReconnects parameters
# Modern MySQL connectors handle reconnection automatically
spring.datasource.url= jdbc:mysql://localhost:3306/testdb?useSSL=false
# FIX #13: Added comment warning about hardcoded credentials
# WARNING: Do not commit actual credentials to version control
# Use environment variables or external configuration in production
spring.datasource.username= root
spring.datasource.password= 123456

spring.jpa.properties.hibernate.dialect= org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto= update

# FIX #15: Adjusted connection pool configuration for better performance
# Maximum pool size for concurrent connections
spring.datasource.hikari.maximum-pool-size= 10
# Minimum idle connections - set lower than max to allow pool flexibility
spring.datasource.hikari.minimum-idle= 2
