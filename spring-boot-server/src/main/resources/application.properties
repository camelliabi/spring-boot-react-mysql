# FIX ERR-004: Removed deprecated useSSL=false parameter
# FIX ERR-003: Use environment variables for credentials instead of hardcoded values
# Set via: export DB_USERNAME=your_user and export DB_PASSWORD=your_password
spring.datasource.url=jdbc:mysql://localhost:3306/testdb?autoReconnect=true&maxReconnects=1
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:changeme}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# FIX ERR-005: Allow connection pool to scale dynamically
# minimum-idle set lower than maximum to enable scaling under load
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=5

# FIX ERR-006: Configurable CORS origins (supports multiple comma-separated values)
app.cors.allowed-origins=http://localhost:8081
