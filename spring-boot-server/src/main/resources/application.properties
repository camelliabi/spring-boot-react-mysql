# FIX #5: Use environment variables for sensitive credentials instead of hardcoding
# Set these as environment variables: DB_URL, DB_USERNAME, DB_PASSWORD
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/testdb?useSSL=false&autoReconnect=true&maxReconnects=1}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# FIX #6: Corrected Hikari pool configuration
# minimum-idle should be lower than maximum-pool-size for proper connection pooling
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
