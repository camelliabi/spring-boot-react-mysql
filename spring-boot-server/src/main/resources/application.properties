# Database Connection Configuration
# BUG #7 FIX: Use environment variables for credentials instead of hardcoded values
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:testdb}?useSSL=true&requireSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}

# BUG #6 FIX: Removed deprecated 'autoReconnect' parameter
# BUG #6 FIX: Added proper SSL configuration (useSSL=true, requireSSL=false for dev)
# For production, set requireSSL=true and configure SSL certificates

# HikariCP Connection Pool Configuration
# BUG #1 FIX: Optimized connection pool settings for better performance
# Previous: minimum-idle=5, maximum-pool-size=5 (too restrictive)
# New: Scale based on application load - recommended formula: ((core_count * 2) + effective_spindle_count)
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=30000

# JPA Configuration
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
