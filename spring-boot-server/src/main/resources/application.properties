# Server Configuration
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/testdb?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# FIX #13: Externalized CORS configuration
# For development environment
cors.allowed.origins=http://localhost:8081

# For production, override with environment variable:
# CORS_ALLOWED_ORIGINS=https://your-production-domain.com
# Or set in application-prod.properties

# Logging Configuration
logging.level.com.bezkoder.spring.datajpa=DEBUG
logging.level.org.springframework.web=INFO
