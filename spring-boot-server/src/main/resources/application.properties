# FIX #5: Removed deprecated autoReconnect and maxReconnects parameters
# Modern MySQL Connector/J handles reconnection automatically
# FIX #6: Added comment about environment variables for credentials
# In production, use environment variables: ${DB_URL}, ${DB_USERNAME}, ${DB_PASSWORD}
spring.datasource.url=jdbc:mysql://localhost:3306/testdb?useSSL=false
spring.datasource.username=root
spring.datasource.password=123456

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# FIX #7: Fixed HikariCP configuration for proper connection pooling
# minimum-idle should be lower than maximum-pool-size to allow dynamic scaling
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
