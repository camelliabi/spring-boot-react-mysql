spring.datasource.url= jdbc:mysql://localhost:3306/testdb?useSSL=false&autoReconnect=true&maxReconnects=1
spring.datasource.username= root
spring.datasource.password= 123456


spring.jpa.properties.hibernate.dialect= org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto= update

# FIX ERROR #4: Added complete HikariCP connection pool configuration.
# Original configuration was incomplete, missing critical timeout settings
# that could lead to connection pool exhaustion and application hangs.
spring.datasource.hikari.maximum-pool-size= 5
spring.datasource.hikari.minimum-idle= 5
# Connection timeout: max time to wait for connection from pool (30 seconds)
spring.datasource.hikari.connection-timeout= 30000
# Idle timeout: max time a connection can sit idle in pool (10 minutes)
spring.datasource.hikari.idle-timeout= 600000
# Max lifetime: max lifetime of a connection in pool (30 minutes)
spring.datasource.hikari.max-lifetime= 1800000
