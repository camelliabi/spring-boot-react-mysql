# FIX #8: Added comment recommending environment variables for credentials
# SECURITY: Use environment variables for sensitive data in production:
# spring.datasource.username=${DB_USERNAME:root}
# spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.url= jdbc:mysql://localhost:3306/testdb?useSSL=false
spring.datasource.username= root
spring.datasource.password= 123456

# FIX #10: Removed deprecated autoReconnect parameter
# Modern MySQL connectors handle reconnection automatically

spring.jpa.properties.hibernate.dialect= org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto= update

# FIX #9: Adjusted connection pool for better elasticity
# minimum-idle set lower than maximum to allow pool to scale down during low traffic
spring.datasource.hikari.maximum-pool-size= 10
spring.datasource.hikari.minimum-idle= 2
spring.datasource.hikari.connection-timeout= 20000
